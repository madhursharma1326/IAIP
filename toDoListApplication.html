<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List Application</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #08264a;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 50px 15px;
    }

    .app {
      width: 100%;
      max-width: 600px;
      background: white;
      color: #08264a;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      text-decoration: underline;
    }

    .input-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 2px solid #08264a;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      border: none;
      padding: 12px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      background: #08264a;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filters button {
      background: #1d5f8a;
    }

    .filters .active {
      background: #2a9d8f;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      background: #f4f7fb;
      border: 1px solid #ddd;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    li.completed .task-text {
      text-decoration: line-through;
      color: gray;
    }

    .task-text {
      flex: 1;
      word-break: break-word;
    }

    .edit-btn {
      background: #f4a261;
    }

    .delete-btn {
      background: #e63946;
    }

    .complete-btn {
      background: #2a9d8f;
    }

    .stats {
      margin-top: 20px;
      text-align: center;
      font-weight: bold;
    }

    @media (max-width: 500px) {
      .input-box {
        flex-direction: column;
      }

      li {
        flex-direction: column;
        align-items: stretch;
      }

      li button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>To-Do List</h1>

    <div class="input-box">
      <input type="text" id="taskInput" placeholder="Enter your task" />
      <button id="addBtn" onclick="addOrUpdateTask()">Add</button>
    </div>

    <div class="filters">
      <button onclick="setFilter('all')" id="allBtn" class="active">All</button>
      <button onclick="setFilter('active')" id="activeBtn">Active</button>
      <button onclick="setFilter('completed')" id="completedBtn">Completed</button>
    </div>

    <ul id="taskList"></ul>

    <div class="stats" id="stats"></div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let editId = null;
    let currentFilter = "all";

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function addOrUpdateTask() {
      const taskInput = document.getElementById("taskInput");
      const taskText = taskInput.value.trim();

      if (taskText === "") {
        alert("Please enter a task");
        return;
      }

      if (editId !== null) {
        tasks = tasks.map(task => {
          if (task.id === editId) {
            return {
              ...task,
              text: taskText
            };
          }
          return task;
        });

        editId = null;
        document.getElementById("addBtn").innerText = "Add";
      } else {
        tasks.push({
          id: Date.now(),
          text: taskText,
          completed: false
        });
      }

      taskInput.value = "";
      saveTasks();
      displayTasks();
    }

    function displayTasks() {
      const taskList = document.getElementById("taskList");
      taskList.innerHTML = "";

      let filteredTasks = tasks;

      if (currentFilter === "active") {
        filteredTasks = tasks.filter(task => !task.completed);
      }

      if (currentFilter === "completed") {
        filteredTasks = tasks.filter(task => task.completed);
      }

      if (filteredTasks.length === 0) {
        taskList.innerHTML = "<li>No tasks found</li>";
      }

      filteredTasks.forEach(task => {
        const li = document.createElement("li");

        if (task.completed) {
          li.classList.add("completed");
        }

        li.innerHTML = `
          <span class="task-text">${task.text}</span>
          <button class="complete-btn" onclick="toggleComplete(${task.id})">
            ${task.completed ? "Undo" : "Complete"}
          </button>
          <button class="edit-btn" onclick="editTask(${task.id})">Edit</button>
          <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
        `;

        taskList.appendChild(li);
      });

      updateStats();
    }

    function toggleComplete(id) {
      tasks = tasks.map(task => {
        if (task.id === id) {
          return {
            ...task,
            completed: !task.completed
          };
        }
        return task;
      });

      saveTasks();
      displayTasks();
    }

    function editTask(id) {
      const task = tasks.find(task => task.id === id);

      document.getElementById("taskInput").value = task.text;
      document.getElementById("addBtn").innerText = "Update";
      editId = id;
    }

    function deleteTask(id) {
      tasks = tasks.filter(task => task.id !== id);

      if (editId === id) {
        editId = null;
        document.getElementById("taskInput").value = "";
        document.getElementById("addBtn").innerText = "Add";
      }

      saveTasks();
      displayTasks();
    }

    function setFilter(filter) {
      currentFilter = filter;

      document.getElementById("allBtn").classList.remove("active");
      document.getElementById("activeBtn").classList.remove("active");
      document.getElementById("completedBtn").classList.remove("active");

      if (filter === "all") {
        document.getElementById("allBtn").classList.add("active");
      }

      if (filter === "active") {
        document.getElementById("activeBtn").classList.add("active");
      }

      if (filter === "completed") {
        document.getElementById("completedBtn").classList.add("active");
      }

      displayTasks();
    }

    function updateStats() {
      const total = tasks.length;
      const completed = tasks.filter(task => task.completed).length;
      const active = total - completed;

      document.getElementById("stats").innerText =
        "Total: " + total + " | Active: " + active + " | Completed: " + completed;
    }

    document.getElementById("taskInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        addOrUpdateTask();
      }
    });

    displayTasks();
  </script>
</body>
</html>
