<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Converter</title>
  <link rel="stylesheet" href="style.css">

<style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #2563eb);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #222;
}

.container {
  width: 90%;
  max-width: 450px;
  background: white;
  padding: 35px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
}

h1 {
  text-align: center;
  margin-bottom: 25px;
  color: #0f172a;
}

.converter-box {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

label {
  font-weight: bold;
  color: #333;
}

input,
select {
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 15px;
}

button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.result {
  margin-top: 15px;
  padding: 15px;
  background: #eff6ff;
  border-left: 5px solid #2563eb;
  border-radius: 6px;
  font-size: 18px;
  font-weight: bold;
  color: #0f172a;
}

@media (max-width: 500px) {
  .container {
    padding: 25px;
  }

  h1 {
    font-size: 26px;
  }
}
</style>


</head>
<body>

  <div class="container">
    <h1>Temperature Converter</h1>

    <div class="converter-box">
      <label for="temperature">Enter Temperature</label>
      <input type="number" id="temperature" placeholder="Example: 32">

      <label for="fromUnit">Convert From</label>
      <select id="fromUnit">
        <option value="celsius">Celsius</option>
        <option value="fahrenheit">Fahrenheit</option>
        <option value="kelvin">Kelvin</option>
      </select>

      <label for="toUnit">Convert To</label>
      <select id="toUnit">
        <option value="fahrenheit">Fahrenheit</option>
        <option value="celsius">Celsius</option>
        <option value="kelvin">Kelvin</option>
      </select>

      <button onclick="convertTemperature()">Convert</button>

      <div id="result" class="result">
        Converted temperature will appear here.
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<script>
function convertTemperature() {
  const temperatureInput = document.getElementById("temperature").value;
  const fromUnit = document.getElementById("fromUnit").value;
  const toUnit = document.getElementById("toUnit").value;
  const resultBox = document.getElementById("result");

  if (temperatureInput === "" || isNaN(temperatureInput)) {
    resultBox.textContent = "Please enter a valid number.";
    return;
  }

  const temperature = parseFloat(temperatureInput);
  let celsius;

  if (fromUnit === "celsius") {
    celsius = temperature;
  } else if (fromUnit === "fahrenheit") {
    celsius = (temperature - 32) * 5 / 9;
  } else if (fromUnit === "kelvin") {
    celsius = temperature - 273.15;
  }

  let converted;

  if (toUnit === "celsius") {
    converted = celsius;
  } else if (toUnit === "fahrenheit") {
    converted = (celsius * 9 / 5) + 32;
  } else if (toUnit === "kelvin") {
    converted = celsius + 273.15;
  }

  const unitSymbols = {
    celsius: "°C",
    fahrenheit: "°F",
    kelvin: "K"
  };

  resultBox.textContent =
    `${temperature} ${unitSymbols[fromUnit]} = ${converted.toFixed(2)} ${unitSymbols[toUnit]}`;
}

</script>
